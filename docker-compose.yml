  #   volumes:
  #     - ./tmp:/app/tmp
  #     - ./logs:/app/logs
  #     - whisper_cache:/root/.cache/huggingface
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  whisper_cache:
